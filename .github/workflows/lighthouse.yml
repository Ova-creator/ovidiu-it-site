name: Lighthouse CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse
        run: npm i -g lighthouse

      - name: Run Lighthouse (Production URL)
        run: |
          lighthouse https://ovidiu.it.com/ \
            --only-categories=performance,accessibility,seo,best-practices \
            --preset=desktop \
            --output=json \
            --output-path=./lighthouse-desktop.json || true
          lighthouse https://ovidiu.it.com/ \
            --only-categories=performance,accessibility,seo,best-practices \
            --preset=mobile \
            --output=json \
            --output-path=./lighthouse-mobile.json || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            lighthouse-desktop.json
            lighthouse-mobile.json
